<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 법정의무교육 현황</title>
<style>
  :root{
    --navy:#15324f; --navy-2:#1f4e78; --line:#dde4ec; --bg:#eef2f6;
    --ok:#1e7d4f; --ok-bg:#e6f4ec; --warn:#b4690e; --warn-bg:#fdf3e4;
    --ink:#1a2733; --muted:#6a7886; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','맑은 고딕','Malgun Gothic',sans-serif;background:var(--bg);
    color:var(--ink);line-height:1.6;padding:18px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto}
  .top{background:var(--navy);color:#fff;border-radius:16px 16px 0 0;padding:24px}
  .top .who{font-size:13px;opacity:.8}
  .top h1{font-size:21px;font-weight:700;margin-top:2px;letter-spacing:-.4px}

  /* 진도 도넛 */
  .ring-card{background:#fff;border:1px solid var(--line);border-top:none;padding:26px 24px;
    display:flex;align-items:center;gap:22px}
  .ring{position:relative;width:104px;height:104px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center}
  .ring .num b{font-size:25px;color:var(--navy);line-height:1}
  .ring .num span{font-size:11px;color:var(--muted);margin-top:2px}
  .ring-info h2{font-size:16px;margin-bottom:4px}
  .ring-info p{font-size:13px;color:var(--muted)}
  .ring-info .rest{color:var(--warn);font-weight:700}

  .list-card{background:#fff;border:1px solid var(--line);border-top:none;
    border-radius:0 0 16px 16px;padding:8px 0 18px}
  .row{display:flex;align-items:center;gap:12px;padding:14px 24px;border-top:1px solid #f0f3f6}
  .row:first-child{border-top:none}
  .badge{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:14px;font-weight:700}
  .badge.done{background:var(--ok-bg);color:var(--ok)}
  .badge.todo{background:var(--warn-bg);color:var(--warn)}
  .row .nm{flex:1;font-size:15px;font-weight:600}
  .row .st{font-size:12px;font-weight:700}
  .row .st.done{color:var(--ok)}
  .row .st.todo{color:var(--warn)}
  .go{display:inline-block;background:var(--navy);color:#fff;text-decoration:none;
    font-size:12px;font-weight:700;padding:7px 13px;border-radius:8px;white-space:nowrap}
  .go:active{background:var(--navy-2)}

  .state{padding:60px 24px;text-align:center;color:var(--muted);font-size:14px}
  .spinner{width:30px;height:30px;border:3px solid #d7dee6;border-top-color:var(--navy-2);
    border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:#fbe7e7;color:#b03030;border-radius:12px;padding:18px;font-size:14px;margin-top:14px}
  .foot{text-align:center;font-size:11px;color:var(--muted);margin-top:16px;line-height:1.7}
  .ask{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px}
  .ask label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px}
  .ask input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit}
  .ask button{width:100%;margin-top:10px;padding:12px;border:none;border-radius:9px;
    background:var(--navy);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="who">법정의무교육 이수 현황</div>
    <h1 id="title">현황을 불러오는 중…</h1>
  </div>

  <div id="content">
    <div class="state"><div class="spinner"></div>이수 현황을 불러오는 중입니다…</div>
  </div>

  <!-- 이름 파라미터가 없을 때 직접 입력 -->
  <div id="askBox" class="ask" style="display:none">
    <label>본인 이름을 입력하세요</label>
    <input id="askName" type="text" placeholder="홍길동" autocomplete="off">
    <button id="askBtn">내 현황 보기</button>
  </div>

  <div class="foot">
    본 현황은 회사 교육관리 시트와 연동되어 있습니다.<br>
    ※ 산업안전보건교육은 공단(edu.kosha.or.kr)에서 별도 이수해야 하며 여기 표시되지 않을 수 있습니다.
  </div>
</div>

<script>
/* ===== 설정 ===== */
const CONFIG = {
  // edu_webapp.gs 배포 웹앱 URL
  GAS_URL: 'https://script.google.com/macros/s/AKfycbzW4zPN30SV33XJ1xE8TgRCFhRYxnZ6C9D0icOU6VjoNtPFAWoZdLYPcjzGH9aihxca/exec',
  // 미이수 과목 '수강하기' 링크: 교육 페이지 주소(index.html). 과목코드는 자동으로 붙음.
  EDU_PAGE: 'https://lsmnice-cmd.github.io/edu-training/index.html',
  // 대시보드 과목명 → 교육페이지 과목코드 매핑 (수강 링크용)
  SUBJECT_CODE: {
    '성희롱':'성희롱예방', '장애인':'장애인인식개선',
    '개인정보':'개인정보보호', '괴롭힘':'괴롭힘예방',
    '산안(상)':'산업안전보건', '산안(하)':'산업안전보건',
    '퇴직연금':'퇴직연금'
  },
};

function getParam(k){ return new URLSearchParams(location.search).get(k); }

// 현재 조회 중인 직원 정보(이름·생년월일) — 수강 링크에 함께 전달
const CURRENT = { name:'', birth:'' };

function ringSVG(pct){
  const r=46, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="104" height="104" viewBox="0 0 104 104">
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="#e6ebf1" stroke-width="9"/>
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="${pct===100?'#1e7d4f':'#1f4e78'}"
      stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

function render(d){
  document.getElementById('title').textContent = d.name + '님';
  let rows='';
  d.subjects.forEach(s=>{
    if(s.done){
      rows+=`<div class="row">
        <div class="badge done">✓</div>
        <div class="nm">${s.name}</div>
        <div class="st done">이수 완료</div></div>`;
    } else {
      const code = CONFIG.SUBJECT_CODE[s.name] || '';
      // 교육 페이지로 이름·생년월일을 함께 넘겨 자동 입력되게 함
      const nameQ = encodeURIComponent(CURRENT.name || '');
      const birthQ = encodeURIComponent(CURRENT.birth || '');
      let link = CONFIG.EDU_PAGE + '?name=' + nameQ + '&birth=' + birthQ;
      if(code) link += '&subject=' + encodeURIComponent(code);
      rows+=`<div class="row">
        <div class="badge todo">!</div>
        <div class="nm">${s.name}</div>
        <a class="go" href="${link}">수강하기 ›</a></div>`;
    }
  });
  const restTxt = d.remaining>0
    ? `<span class="rest">${d.remaining}개 과목</span>이 남았습니다.`
    : `모든 교육을 이수했습니다. 수고하셨습니다!`;
  document.getElementById('content').innerHTML = `
    <div class="ring-card">
      <div class="ring">${ringSVG(d.percent)}
        <div class="num"><b>${d.percent}%</b><span>${d.done}/${d.total}</span></div>
      </div>
      <div class="ring-info">
        <h2>전체 진도율 ${d.percent}%</h2>
        <p>${restTxt}</p>
      </div>
    </div>
    <div class="list-card">${rows}</div>`;
}

function showError(msg){
  document.getElementById('title').textContent='조회 안내';
  document.getElementById('content').innerHTML = `<div class="err">${msg}</div>`;
}

function load(name){
  CURRENT.name = name;   // 수강 링크에 쓸 이름 저장
  document.getElementById('askBox').style.display='none';
  if(!CONFIG.GAS_URL || CONFIG.GAS_URL.indexOf('YOUR_')===0){
    // 데모: 샘플 데이터
    render({name:name||'홍길동',total:4,done:2,remaining:2,percent:50,
      subjects:[{name:'성희롱',done:true},{name:'장애인',done:true},
                {name:'개인정보',done:false},{name:'괴롭힘',done:false}]});
    return;
  }
  // JSONP로 조회 (CORS 회피)
  const cb='__eduCb'+Date.now();
  window[cb]=function(res){
    if(res && res.ok) render(res);
    else showError((res&&res.msg)||'조회에 실패했습니다.');
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=CONFIG.GAS_URL+'?name='+encodeURIComponent(name)+'&callback='+cb;
  s.onerror=()=>showError('서버 연결에 실패했습니다. 잠시 후 다시 시도하세요.');
  document.body.appendChild(s);
}

/* 시작: ?name= 있으면 바로 조회, 없으면 입력창 */
window.addEventListener('load',()=>{
  const name=getParam('name');
  const birth=getParam('birth');
  if(birth) CURRENT.birth=birth;   // 생년월일을 수강 링크에 전달하기 위해 저장
  if(name){ CURRENT.name=name; load(name); }
  else{
    document.getElementById('title').textContent='이름을 입력하세요';
    document.getElementById('content').innerHTML='';
    document.getElementById('askBox').style.display='block';
    document.getElementById('askBtn').addEventListener('click',()=>{
      const v=document.getElementById('askName').value.trim();
      if(v) load(v);
    });
    document.getElementById('askName').addEventListener('keydown',e=>{
      if(e.key==='Enter'){ const v=e.target.value.trim(); if(v) load(v); }
    });
  }
});
</script>
</body>
</html>

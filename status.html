<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 법정의무교육 현황</title>
<style>
  :root{
    --navy:#15324f; --navy-2:#1f4e78; --line:#dde4ec; --bg:#eef2f6;
    --ok:#1e7d4f; --ok-bg:#e6f4ec; --warn:#b4690e; --warn-bg:#fdf3e4;
    --ink:#1a2733; --muted:#6a7886; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','맑은 고딕','Malgun Gothic',sans-serif;background:var(--bg);
    color:var(--ink);line-height:1.6;padding:18px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto}
  .top{background:var(--navy);color:#fff;border-radius:16px 16px 0 0;padding:24px}
  .top .who{font-size:13px;opacity:.8}
  .top h1{font-size:21px;font-weight:700;margin-top:2px;letter-spacing:-.4px}

  /* 진도 도넛 */
  .ring-card{background:#fff;border:1px solid var(--line);border-top:none;padding:26px 24px;
    display:flex;align-items:center;gap:22px}
  .ring{position:relative;width:104px;height:104px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center}
  .ring .num b{font-size:25px;color:var(--navy);line-height:1}
  .ring .num span{font-size:11px;color:var(--muted);margin-top:2px}
  .ring-info h2{font-size:16px;margin-bottom:4px}
  .ring-info p{font-size:13px;color:var(--muted)}
  .ring-info .rest{color:var(--warn);font-weight:700}

  .list-card{background:#fff;border:1px solid var(--line);border-top:none;
    border-radius:0 0 16px 16px;padding:8px 0 18px}
  .row{display:flex;align-items:center;gap:12px;padding:14px 24px;border-top:1px solid #f0f3f6}
  .row:first-child{border-top:none}
  .badge{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:14px;font-weight:700}
  .badge.done{background:var(--ok-bg);color:var(--ok)}
  .badge.todo{background:var(--warn-bg);color:var(--warn)}
  .row .nm{flex:1;font-size:15px;font-weight:600}
  .row .st{font-size:12px;font-weight:700}
  .row .st.done{color:var(--ok)}
  .row .st.todo{color:var(--warn)}
  .go{display:inline-block;background:var(--navy);color:#fff;text-decoration:none;
    font-size:12px;font-weight:700;padding:7px 13px;border-radius:8px;white-space:nowrap}
  .go:active{background:var(--navy-2)}
  .go.up{background:#0563c1;border:none;cursor:pointer;font-family:inherit}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;
    align-items:center;justify-content:center;z-index:50;padding:18px}
  .modal.on{display:flex}
  .modal-box{background:#fff;border-radius:14px;padding:22px;max-width:380px;width:100%}
  .modal-box h3{font-size:16px;color:#15324f;margin-bottom:6px}
  .modal-box p{font-size:13px;color:#6a7886;margin-bottom:14px}
  .modal-box input[type=file]{width:100%;font-size:13px;margin-bottom:14px}
  .modal-box .mbtn{display:flex;gap:8px}
  .modal-box button{flex:1;padding:11px;border:none;border-radius:9px;font-size:14px;
    font-weight:700;font-family:inherit;cursor:pointer}
  .modal-box .ok{background:#15324f;color:#fff}
  .modal-box .cancel{background:#eef2f6;color:#5c6b7a}
  #upMsg{font-size:13px;margin-top:10px;text-align:center}

  .state{padding:60px 24px;text-align:center;color:var(--muted);font-size:14px}
  .spinner{width:30px;height:30px;border:3px solid #d7dee6;border-top-color:var(--navy-2);
    border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:#fbe7e7;color:#b03030;border-radius:12px;padding:18px;font-size:14px;margin-top:14px}
  .foot{text-align:center;font-size:11px;color:var(--muted);margin-top:16px;line-height:1.7}
  .ask{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px}
  .ask label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px}
  .ask input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit}
  .ask button{width:100%;margin-top:10px;padding:12px;border:none;border-radius:9px;
    background:var(--navy);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="who">법정의무교육 이수 현황</div>
    <h1 id="title">현황을 불러오는 중…</h1>
  </div>

  <div id="content">
    <div class="state"><div class="spinner"></div>이수 현황을 불러오는 중입니다…</div>
  </div>

  <!-- 본인 인증 (이름 + 생년월일) -->
  <div id="askBox" class="ask" style="display:none">
    <label>본인 이름</label>
    <input id="askName" type="text" placeholder="이름" autocomplete="off">
    <label style="margin-top:10px">생년월일 (예: 1985-03-15)</label>
    <input id="askBirth" type="text" placeholder="YYYY-MM-DD" autocomplete="off" inputmode="numeric">
    <button id="askBtn">본인 확인 후 현황 보기</button>
  </div>

  <div class="foot">
    본 현황은 회사 교육관리 시트와 연동되어 있습니다.<br>
    ※ 산업안전보건교육은 공단(edu.kosha.or.kr)에서 별도 이수해야 하며 여기 표시되지 않을 수 있습니다.
  </div>
</div>

<!-- 산안 수료증 제출 모달 -->
<div class="modal" id="upModal">
  <div class="modal-box">
    <h3 id="upTitle">수료증 제출</h3>
    <p>공단에서 받은 수료증 파일(PDF·이미지)을 첨부하세요. 제출하면 이수 완료로 표시됩니다.</p>
    <input type="file" id="upFile" accept=".pdf,.jpg,.jpeg,.png">
    <div class="mbtn">
      <button class="cancel" onclick="closeUpload()">취소</button>
      <button class="ok" id="upOk" onclick="submitUpload()">제출</button>
    </div>
    <div id="upMsg"></div>
  </div>
</div>

<script>
/* ===== 설정 ===== */
const CONFIG = {
  // edu_webapp.gs 배포 웹앱 URL
  GAS_URL: 'https://script.google.com/macros/s/AKfycbzW4zPN30SV33XJ1xE8TgRCFhRYxnZ6C9D0icOU6VjoNtPFAWoZdLYPcjzGH9aihxca/exec',
  // 미이수 과목 '수강하기' 링크: 교육 페이지 주소(index.html). 과목코드는 자동으로 붙음.
  EDU_PAGE: 'https://lsmnice-cmd.github.io/edu-training/index.html',
  // 대시보드 과목명 → 교육페이지 과목코드 매핑 (수강 링크용)
  SUBJECT_CODE: {
    '성희롱':'성희롱예방', '장애인':'장애인인식개선',
    '개인정보':'개인정보보호', '괴롭힘':'괴롭힘예방',
    '산안(상)':'산업안전보건', '산안(하)':'산업안전보건',
    '퇴직연금':'퇴직연금'
  },
  // 화면에 길게 표시할 이름 (시트 헤더는 그대로 두고 표시만)
  DISPLAY_NAME: {
    '산안(상)':'산업안전보건교육 (상반기)',
    '산안(하)':'산업안전보건교육 (하반기)',
    '성희롱':'직장 내 성희롱 예방교육',
    '장애인':'직장 내 장애인 인식개선 교육',
    '개인정보':'개인정보보호 교육',
    '퇴직연금':'퇴직연금 교육',
    '괴롭힘':'직장 내 괴롭힘 예방교육'
  },
  // 산안 과목(수료증 업로드 대상) → part 코드
  KOSHA_PART: { '산안(상)':'sang', '산안(하)':'ha' },
};

function getParam(k){ return new URLSearchParams(location.search).get(k); }

// 현재 조회 중인 직원 정보(이름·생년월일) — 수강 링크에 함께 전달
const CURRENT = { name:'', birth:'' };

function ringSVG(pct){
  const r=46, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="104" height="104" viewBox="0 0 104 104">
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="#e6ebf1" stroke-width="9"/>
    <circle cx="52" cy="52" r="${r}" fill="none" stroke="${pct===100?'#1e7d4f':'#1f4e78'}"
      stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

function render(d){
  document.getElementById('title').textContent = d.name + '님';
  let rows='';
  d.subjects.forEach(s=>{
    const disp = CONFIG.DISPLAY_NAME[s.name] || s.name;   // 화면 표시명(길게)
    const koshaPart = CONFIG.KOSHA_PART[s.name];          // 산안이면 part 코드
    if(s.done){
      rows+=`<div class="row">
        <div class="badge done">✓</div>
        <div class="nm">${disp}</div>
        <div class="st done">이수 완료</div></div>`;
    } else {
      const code = CONFIG.SUBJECT_CODE[s.name] || '';
      const nameQ = encodeURIComponent(CURRENT.name || '');
      const birthQ = encodeURIComponent(CURRENT.birth || '');
      let link = CONFIG.EDU_PAGE + '?name=' + nameQ + '&birth=' + birthQ;
      if(code) link += '&subject=' + encodeURIComponent(code);
      // 산안 과목: '수강하기'(공단 안내) + '수료증 제출' 버튼
      let btns = `<a class="go" href="${link}">수강하기 ›</a>`;
      if(koshaPart){
        btns += ` <button class="go up" onclick="openUpload('${koshaPart}','${disp.replace(/'/g,"")}')">수료증 제출</button>`;
      }
      rows+=`<div class="row">
        <div class="badge todo">!</div>
        <div class="nm">${disp}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">${btns}</div></div>`;
    }
  });
  const restTxt = d.remaining>0
    ? `<span class="rest">${d.remaining}개 과목</span>이 남았습니다.`
    : `모든 교육을 이수했습니다. 수고하셨습니다!`;
  document.getElementById('content').innerHTML = `
    <div class="ring-card">
      <div class="ring">${ringSVG(d.percent)}
        <div class="num"><b>${d.percent}%</b><span>${d.done}/${d.total}</span></div>
      </div>
      <div class="ring-info">
        <h2>전체 진도율 ${d.percent}%</h2>
        <p>${restTxt}</p>
      </div>
    </div>
    <div class="list-card">${rows}</div>`;
}

function showError(msg){
  document.getElementById('title').textContent='조회 안내';
  document.getElementById('content').innerHTML = `<div class="err">${msg}</div>`;
}

function load(name, birth){
  CURRENT.name = name;
  CURRENT.birth = birth || '';
  document.getElementById('askBox').style.display='none';
  document.getElementById('content').innerHTML=
    '<div class="state"><div class="spinner"></div>본인 확인 중입니다…</div>';
  if(!CONFIG.GAS_URL || CONFIG.GAS_URL.indexOf('YOUR_')===0){
    render({name:name||'홍길동',birth:birth,total:4,done:2,remaining:2,percent:50,
      subjects:[{name:'성희롱',done:true},{name:'장애인',done:true},
                {name:'개인정보',done:false},{name:'괴롭힘',done:false}]});
    return;
  }
  const cb='__eduCb'+Date.now();
  window[cb]=function(res){
    if(res && res.ok){ if(res.birth) CURRENT.birth=res.birth; render(res); }
    else { showAuth((res&&res.msg)||'본인 확인에 실패했습니다.'); }
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=CONFIG.GAS_URL+'?name='+encodeURIComponent(name)
        +'&birth='+encodeURIComponent(birth||'')+'&callback='+cb;
  s.onerror=()=>showAuth('서버 연결에 실패했습니다. 잠시 후 다시 시도하세요.');
  document.body.appendChild(s);
}

/** 인증 입력창 표시 (메시지 포함) */
function showAuth(msg){
  document.getElementById('title').textContent='본인 확인';
  document.getElementById('content').innerHTML = msg
    ? '<div class="err" style="margin:14px 0 0">'+msg+'</div>' : '';
  const box=document.getElementById('askBox');
  box.style.display='block';
  // 이름이 링크로 들어와 있으면 미리 채워줌(생년월일만 입력)
  if(CURRENT.name) document.getElementById('askName').value=CURRENT.name;
  bindAuth();
}

function bindAuth(){
  const go=function(){
    const nm=document.getElementById('askName').value.trim();
    const bt=document.getElementById('askBirth').value.trim();
    if(!nm){ alert('이름을 입력하세요'); return; }
    if(!bt){ alert('생년월일을 입력하세요'); return; }
    load(nm, bt);
  };
  document.getElementById('askBtn').onclick=go;
  document.getElementById('askBirth').onkeydown=function(e){ if(e.key==='Enter') go(); };
}

/* 시작: 항상 본인 인증(이름+생년월일)부터. 링크의 이름은 미리 채워줌 */
window.addEventListener('load',()=>{
  const name=getParam('name');
  if(name) CURRENT.name=name;
  document.getElementById('content').innerHTML='';
  showAuth('');   // 인증 입력창 표시
});

/* ===== 산안 수료증 업로드 ===== */
let UP_PART='';
function openUpload(part, dispName){
  UP_PART=part;
  document.getElementById('upTitle').textContent=(dispName||'산업안전보건교육')+' 수료증 제출';
  document.getElementById('upFile').value='';
  document.getElementById('upMsg').textContent='';
  document.getElementById('upOk').disabled=false;
  document.getElementById('upOk').textContent='제출';
  document.getElementById('upModal').classList.add('on');
}
function closeUpload(){ document.getElementById('upModal').classList.remove('on'); }

function submitUpload(){
  const f=document.getElementById('upFile').files[0];
  const msg=document.getElementById('upMsg');
  if(!f){ msg.style.color='#b03030'; msg.textContent='파일을 선택하세요.'; return; }
  if(f.size>10*1024*1024){ msg.style.color='#b03030'; msg.textContent='10MB 이하 파일만 가능합니다.'; return; }
  const okBtn=document.getElementById('upOk');
  okBtn.disabled=true; okBtn.textContent='업로드 중...';
  const reader=new FileReader();
  reader.onload=function(){
    const b64=String(reader.result).split(',')[1];
    const payload={ action:'koshaCert', name:CURRENT.name, birth:CURRENT.birth,
      part:UP_PART, fileName:f.name, mimeType:f.type, fileData:b64 };
    fetch(CONFIG.GAS_URL,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)})
      .then(function(){
        msg.style.color='#1e7d4f';
        msg.textContent='제출되었습니다. 잠시 후 현황에 반영됩니다.';
        okBtn.textContent='제출 완료';
        setTimeout(function(){ closeUpload(); load(CURRENT.name, CURRENT.birth); }, 1500);
      })
      .catch(function(e){
        msg.style.color='#b03030'; msg.textContent='업로드 실패: '+e;
        okBtn.disabled=false; okBtn.textContent='제출';
      });
  };
  reader.readAsDataURL(f);
}
</script>
</body>
</html>
